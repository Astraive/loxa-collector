# loxa.yaml — Unified configuration for loxa-collector, loxa-cli, and loxa-go
# Place this file at the project root or set LOXA_CONFIG_PATH to override.
# All values can be overridden via environment variables (see docs).

version: "1.0"

# ─── Collector ───────────────────────────────────────────────────────────────
collector:
  addr: ":9090"                          # Listen address
  read_header_timeout: "5s"
  shutdown_timeout: "10s"
  max_body_bytes: 10485760               # 10 MB
  max_events_per_request: 5000

# ─── Auth ─────────────────────────────────────────────────────────────────────
auth:
  enabled: false
  header: "X-API-Key"
  # value_env: "COLLECTOR_API_KEY"       # Load from env instead of file

# ─── Rate Limiting ───────────────────────────────────────────────────────────
rate_limit:
  enabled: true
  rps: 1000
  burst: 1000

# ─── Routes ──────────────────────────────────────────────────────────────────
routes:
  ingest: "/ingest"
  health: "/healthz"
  ready:  "/readyz"
  metrics: "/metrics"

# ─── Storage ─────────────────────────────────────────────────────────────────
storage:
  primary: "duckdb"                      # duckdb (only option currently)

# ─── DuckDB ──────────────────────────────────────────────────────────────────
duckdb:
  path: "loxa.db"
  driver: "duckdb"
  table: "events"
  raw_column: "raw"
  store_raw: true
  checkpoint_on_shutdown: true
  checkpoint_interval: "0s"              # 0 = disabled
  max_open_conns: 1
  max_idle_conns: 1
  batch_size: 0                          # 0 = per-event inserts
  flush_interval: "0s"                   # 0 = disabled
  writer_loop: false
  # Appender mode (high-performance, requires writer_loop: true)
  # use_appender: false

  # Column mapping: schema field → DuckDB column
  schema:
    event_id:    "event_id"
    event_type:  "event"
    service:     "service"
    status_code: "http.status"
    duration_ms: "duration_ms"
    timestamp:   "timestamp"

  # Column types override (auto-detected if omitted)
  column_types:
    status_code: "INTEGER"
    http.status: "INTEGER"
    duration_ms: "DOUBLE"
    timestamp:   "TIMESTAMP"

  export:
    enabled: false
    format: "parquet"                    # parquet (only option currently)
    interval: "1h"
    path: "exports"

# ─── Kafka ───────────────────────────────────────────────────────────────────
kafka:
  brokers:
    - "127.0.0.1:9092"
  topic: "loxa-events"

# ─── Worker ──────────────────────────────────────────────────────────────────
worker:
  consumer_group: "loxa-worker"
  poll_timeout: "2s"

# ─── Reliability ─────────────────────────────────────────────────────────────
reliability:
  mode: "direct"                        # direct | spool | queue

  # Spool (local WAL) settings (used when mode: spool)
  spool_dir: "loxa-spool"
  spool_file: "spool.ndjson"
  max_spool_bytes: 10737418240           # 10 GB
  fsync: true
  delivery_queue_size: 4096

# ─── Retry ───────────────────────────────────────────────────────────────────
retry:
  enabled: true
  max_attempts: 10
  initial_backoff: "100ms"
  max_backoff: "30s"
  jitter: true

# ─── Dead Letter Queue ───────────────────────────────────────────────────────
dead_letter:
  enabled: false
  path: "loxa-dlq.ndjson"

# ─── Fanout ──────────────────────────────────────────────────────────────────
fanout:
  delivery:
    policy: "require_primary"           # best_effort | require_primary | require_all
    fallback:
      enabled: false
      on_primary_failure: false
      on_secondary_failure: false
      on_policy_failure: true
    dlq:
      on_primary_failure: true
      on_secondary_failure: false
      on_fallback_failure: true
      on_policy_failure: true

  # outputs:
  #   - name: "duckdb-primary"
  #     type: "duckdb"
  #     role: "primary"
  #     enabled: true
  #     duckdb:
  #       path: "loxa.db"
  #       table: "events"
  #       store_raw: true
  #
  #   - name: "loki-secondary"
  #     type: "loki"
  #     role: "secondary"
  #     enabled: false
  #     loki:
  #       url: "http://localhost:3100"
  #       tenant_id: ""
  #       labels:
  #         app: "loxa"
  #       batch_size: 100
  #       flush_interval: "1s"
  #       timeout: "10s"

# ─── Deduplication ───────────────────────────────────────────────────────────
dedupe:
  enabled: false
  key: "event_id"
  window: "24h"
  backend: "memory"                     # memory (only option currently)

# ─── Schema Governance ───────────────────────────────────────────────────────
schema:
  mode: "off"                           # off | warn | reject | quarantine
  schema_version: "v1"
  event_version: "v1"
  quarantine_path: "loxa-quarantine.ndjson"

  # registry:
  #   - schema_version: "v1"
  #     event_version: "v1"
  #     required_fields:
  #       - "schema_version"
  #       - "event_version"
  #       - "event_id"
  #       - "event"
  #       - "timestamp"

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  level: "info"                         # debug | info | warn | error
  format: "json"                        # json | text

# ─── Metrics ─────────────────────────────────────────────────────────────────
metrics:
  prometheus: true

# ─── CLI ──────────────────────────────────────────────────────────────────────
cli:
  collector_url: "http://127.0.0.1:9090"
  collector_repo_path: "./loxa-collector"
  spec_repo_path: "./loxa-spec"
  duckdb_path: "loxa.db"
  spool_dir: "loxa-spool"
  spool_file: "spool.ndjson"
  dlq_path: "loxa-dlq.ndjson"