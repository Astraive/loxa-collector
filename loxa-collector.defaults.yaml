collector:
  addr: ":9090"
  read_header_timeout: 5s
  shutdown_timeout: 10s
  max_body_bytes: 10485760
  max_events_per_request: 5000
  server:
    http:
      enabled: true
      addr: ":9090"
      read_header_timeout: 5s
      max_body_bytes: 10485760
      max_header_bytes: 1048576
      idle_timeout: 90s
    grpc:
      enabled: false
      port: ":9091"
      max_connections: 1000
      max_concurrent_streams: 100
      max_recv_msg_size: 4194304
      max_send_msg_size: 4194304
      keepalive:
        max_connection_age: 5m
        max_connection_age_grace: 30s
        time: 2m
        timeout: 20s
    graphql:
      enabled: false
      port: ":9092"
      playground: true
      depth_limit: 10
      batch_limit: 10

auth:
  enabled: false
  header: X-API-Key
  value_env: COLLECTOR_API_KEY

rate_limit:
  enabled: true
  rps: 1000
  burst: 1000

routes:
  ingest: /ingest
  health: /healthz
  ready: /readyz
  metrics: /metrics

storage:
  primary: duckdb

duckdb:
  path: loxa.db
  driver: duckdb
  table: events
  raw_column: raw
  store_raw: true
  checkpoint_on_shutdown: true
  checkpoint_interval: 0s
  max_open_conns: 1
  max_idle_conns: 1
  batch_size: 0
  flush_interval: 0s
  writer_loop: false
  writer_queue_size: 0
  export:
    enabled: false
    format: parquet
    interval: 1h
    path: exports
  schema:
    event_id: event_id
    event_type: event
    service: service
    status_code: http.status
    duration_ms: duration_ms
    timestamp: timestamp
  column_types:
    status_code: INTEGER
    http.status: INTEGER
    duration_ms: DOUBLE
    timestamp: TIMESTAMP

retention:
  enabled: false
  days: 30
  max_size: 0

kafka:
  brokers:
    - 127.0.0.1:9092
  topic: loxa-events

worker:
  consumer_group: loxa-worker
  poll_timeout: 2s

logging:
  level: info
  format: json

metrics:
  prometheus: true

reliability:
  mode: direct
  spool_dir: loxa-spool
  spool_file: spool.ndjson
  max_spool_bytes: 10737418240
  fsync: true
  delivery_queue_size: 4096

limits:
  max_inflight_requests: 1024
  max_inflight_events: 100000
  max_queue_bytes: 268435456
  max_event_bytes: 262144
  max_attr_count: 512
  max_attr_depth: 16
  max_string_length: 16384

identity:
  mode: payload
  auth_identity_wins: true
  allow_payload_identity: true

privacy:
  mode: warn
  collector_redaction: true
  emergency_redaction: false
  blocklist:
    - password
    - passwd
    - secret
    - token
    - api_key
    - apikey
    - authorization
    - cookie
    - set-cookie
    - private_key
    - access_token
    - refresh_token
    - session
  secret_scan: true

components:
  receivers:
    - loxa_http
    - loxa_ndjson
  processors:
    - validate
    - identity
    - redact
    - size_limit
    - dedupe
    - memory_limiter
    - cardinality_limit
  exporters:
    - duckdb
  extensions:
    - health
    - ready
    - metrics

retry:
  enabled: true
  max_attempts: 10
  initial_backoff: 100ms
  max_backoff: 30s
  jitter: true

dead_letter:
  enabled: false
  path: loxa-dlq.ndjson

fanout:
  outputs: []
  delivery:
    policy: require_primary
    fallback:
      enabled: false
      on_primary_failure: false
      on_secondary_failure: false
      on_policy_failure: true
    dlq:
      on_primary_failure: true
      on_secondary_failure: false
      on_fallback_failure: true
      on_policy_failure: true

dedupe:
  enabled: false
  key: event_id
  window: 24h
  backend: memory

schema_governance:
  mode: off
  schema_version: v1
  event_version: v1
  quarantine_path: loxa-quarantine.ndjson
  registry:
    - schema_version: v1
      event_version: v1
      required_fields:
        - schema_version
        - event_version
        - event_id
        - event
        - timestamp
