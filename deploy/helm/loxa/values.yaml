global:
  imageRegistry: ghcr.io/astraive
  imagePullSecrets: []
  serviceAccount:
    create: true
    name: ""
    annotations: {}

nameOverride: ""
fullnameOverride: ""

collector:
  enabled: true
  replicaCount: 2

  image:
    repository: loxa-collector
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9090
    metricsPort: 9090
    annotations: {}

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

  podAnnotations: {}
  podLabels: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector: {}
  tolerations: []
  affinity: {}

  config:
    collector:
      addr: ":9090"
      read_header_timeout: "5s"
      shutdown_timeout: "10s"
      max_body_bytes: 10485760
      max_events_per_request: 5000

    auth:
      enabled: false

    rate_limit:
      enabled: false

    routes:
      ingest: /ingest
      health: /healthz
      ready: /readyz
      metrics: /metrics

    storage:
      primary: memory

    logging:
      level: info
      format: json

    metrics:
      prometheus: true

worker:
  enabled: true
  replicaCount: 2

  image:
    repository: loxa-worker
    tag: latest
    pullPolicy: IfNotPresent

  podAnnotations: {}
  podLabels: {}

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

  config:
    kafka:
      brokers: []
      topic: ""

    worker:
      consumer_group: "loxa-worker"
      poll_timeout: "1s"

    logging:
      level: info
      format: json

    metrics:
      prometheus: true

    fanout:
      outputs: []

    reliability:
      mode: memory

persistence:
  enabled: false

  collector:
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi

  worker:
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi

networkPolicy:
  enabled: false
  egress: {}
  ingress: {}

rbac:
  create: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true